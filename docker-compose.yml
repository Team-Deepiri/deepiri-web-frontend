version: "3.9"
services:
  hub-server:
    build: ./packages/server
    ports:
      - "5200:5200"
    environment:
      - REALTIME_GATEWAY_URL=ws://realtime-gateway:5008
      - API_GATEWAY_URL=http://api-gateway:5100
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    networks:
      - deepiri

  portal:
    build: ./packages/portal
    ports:
      - "5173:5173"
    depends_on:
      - hub-server
    networks:
      - deepiri

  immersive:
    build: ./packages/immersive
    ports:
      - "5174:5174"
    depends_on:
      - hub-server
    networks:
      - deepiri

networks:
  deepiri:
    external: true
