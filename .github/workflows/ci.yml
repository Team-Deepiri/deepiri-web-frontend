name: Deepiri CI - deepiri-web-frontend

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  packages: read

jobs:
  ci:
    name: Lint, Build, Test, Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci
        
      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Run test
        run: npm run test

      - name: Run type check
        run: npm run type-check
