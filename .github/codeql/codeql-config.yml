name: deepiri-web-frontend-codeql-config

# Focus analysis on maintained app and script code.
paths:
  - src
  - scripts

# Exclude generated/build/runtime artifact paths.
paths-ignore:
  - '**/node_modules/**'
  - '**/dist/**'
  - '**/build/**'
  - '**/coverage/**'
  - '**/.vite/**'
  - '**/*.min.js'
